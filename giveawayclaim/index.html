<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giveaway Claim - Zelriczyrk</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0022, #000000);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            padding: 60px 90px;
            box-shadow: 0 0 70px rgba(138, 43, 226, 0.6);
            text-align: center;
        }
        h1 { font-size: 46px; background: linear-gradient(90deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        button { padding: 18px 65px; font-size: 24px; background: rgba(255,215,0,0.85); color: #000; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 50px #ffd700; }
        .footer { margin-top: 40px; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="glass">
        <h1>🎉 GIVEAWAY CLAIM</h1>
        
        <div id="loginArea">
            <button onclick="loginWithDiscord()">🔑 LOGIN WITH DISCORD</button>
        </div>

        <div id="claimArea" style="display:none;">
            <h2>Welcome, <span id="username"></span>!</h2>
            <button onclick="submitClaim()">🚀 CLAIM REWARD</button>
        </div>

        <div class="footer">
            <a href="../tos" style="color:#0ff;">Terms of Service</a> | 
            <a href="../privacy" style="color:#0ff;">Privacy Policy</a>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1515398637147000903";

        function loginWithDiscord() {
            const currentUrl = window.location.href.split('?')[0].split('#')[0];
            const url = `https://discord.com/api/oauth2/authorize?client_id=\( {CLIENT_ID}&redirect_uri= \){encodeURIComponent(currentUrl)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        window.onload = function() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');

            if (token) {
                fetch('https://discord.com/api/users/@me', {
                    headers: { Authorization: `Bearer ${token}` }
                })
                .then(r => r.json())
                .then(user => {
                    document.getElementById('username').textContent = user.username;
                    document.getElementById('loginArea').style.display = 'none';
                    document.getElementById('claimArea').style.display = 'block';
                });
            }
        };

        async function submitClaim() {
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            const user = document.getElementById('username').textContent;
            console.log(`[GIVEAWAY CLAIM] User: ${user} | IP: ${ipData.ip}`);
            alert("✅ Claim successful! IP logged.");
        }
    </script>
</body>
</html>
