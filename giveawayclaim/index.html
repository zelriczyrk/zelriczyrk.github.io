 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giveaway Claim - Zelriczyrk</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0022, #000000);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            padding: 50px 80px;
            box-shadow: 0 0 70px rgba(138, 43, 226, 0.6);
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        h1 {
            font-size: 46px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button {
            margin-top: 30px;
            padding: 18px 65px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(255, 215, 0, 0.75);
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 40px #ffd700;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 60px #ffd700;
        }

        .footer-links {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.8;
        }

        .footer-links a {
            color: #0ff;
            text-decoration: none;
            margin: 0 12px;
        }
    </style>
</head>
<body>
    <div class="glass">
        <h1>🎉 GIVEAWAY CLAIM</h1>
        
        <div id="loginArea">
            <button onclick="startLogin()">LOGIN WITH DISCORD</button>
        </div>

        <div id="claimArea" style="display:none;">
            <h2>Welcome, <span id="username"></span>!</h2>
            <button onclick="submitClaim()">🚀 CLAIM YOUR REWARD</button>
        </div>

        <div class="footer-links">
            <a href="../tos">Terms of Service</a> |
            <a href="../privacy">Privacy Policy</a>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1515398637147000903";
        const REDIRECT_URI = "https://zelriczyrk.github.io/giveawayclaim/";

        function startLogin() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=\( {CLIENT_ID}&redirect_uri= \){encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        window.onload = function() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');

            if (token) {
                fetch('https://discord.com/api/users/@me', {
                    headers: { Authorization: `Bearer ${token}` }
                })
                .then(r => r.json())
                .then(user => {
                    document.getElementById('username').textContent = user.username;
                    document.getElementById('loginArea').style.display = 'none';
                    document.getElementById('claimArea').style.display = 'block';
                });
            }
        };

        async function submitClaim() {
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            console.log(`[CLAIM] User: ${document.getElementById('username').textContent} | IP: ${ipData.ip}`);
            alert("✅ Claim successful! Waiting for admin review.");
        }
    </script>
</body>
</html>
