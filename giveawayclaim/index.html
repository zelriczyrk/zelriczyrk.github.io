<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giveaway Claim</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; min-height:100vh; background:linear-gradient(135deg,#0a0a0a,#1a1a2e,#16213e); color:white; position:relative; }
        body::before { content:''; position:absolute; inset:0; background:url('https://picsum.photos/id/1015/1920/1080') center/cover; filter:blur(10px) brightness(0.55); z-index:-2; }
        .container { max-width:480px; margin:2rem auto; padding:0 1rem; }
        .glass-card { background:rgba(255,255,255,0.10); backdrop-filter:blur(24px); border-radius:28px; border:1px solid rgba(255,255,255,0.22); padding:2.5rem 2rem; box-shadow:0 30px 60px -15px rgba(0,0,0,0.6); position:relative; }
        .liquid-glow { position:absolute; inset:-60%; background:radial-gradient(circle at 40% 30%, rgba(103,232,249,0.45), transparent 60%); animation:liquidFlow 18s linear infinite; z-index:-1; opacity:0.7; }
        @keyframes liquidFlow { 0%{transform:rotate(0deg) translate(20px,15px)} 50%{transform:rotate(180deg) translate(-25px,-30px)} 100%{transform:rotate(360deg) translate(20px,15px)} }
        h1 { font-size:2.6rem; background:linear-gradient(90deg,#67e8f9,#a5f3fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .claim-btn { width:100%; padding:17px; font-size:1.3rem; font-weight:700; text-transform:uppercase; background:rgba(255,255,255,0.10); backdrop-filter:blur(18px); border:2px solid rgba(255,255,255,0.22); border-radius:9999px; cursor:pointer; margin-top:1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="liquid-glow"></div>
            <h1>GIVEAWAY CLAIM</h1>
            <p style="opacity:0.8;margin:0.4rem 0 1.6rem;">zelriczyrk.github.io/giveawayclaim</p>
            <div style="margin:1.3rem 0;text-align:left;">
                <label>Discord Username</label>
                <input type="text" id="discord" placeholder="username#0000" style="width:100%;padding:15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.22);border-radius:16px;color:white;">
            </div>
            <div style="margin:1.3rem 0;text-align:left;">
                <label>Roblox Username</label>
                <input type="text" id="roblox" placeholder="Your Roblox username" style="width:100%;padding:15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.22);border-radius:16px;color:white;">
            </div>
            <div style="display:flex;align-items:start;gap:10px;margin:1.4rem 0;font-size:0.9rem;">
                <input type="checkbox" id="tos">
                <label for="tos">I agree to TOS & Privacy Policy</label>
            </div>
            <button class="claim-btn" onclick="submitClaim()">CLAIM REWARD</button>
        </div>
        <div style="text-align:center;margin-top:2rem;">
            <a href="/admin" style="color:#67e8f9;">Admin Panel →</a>
        </div>
    </div>
    <script>
        let claims = JSON.parse(localStorage.getItem('giveawayClaims')) || [];
        async function submitClaim() {
            const discord = document.getElementById('discord').value.trim();
            const roblox = document.getElementById('roblox').value.trim();
            if (!discord || !roblox) return alert("Please fill all fields");
            const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=> 'Unknown');
            const claimCode = 'CL-' + Math.random().toString(36).substr(2,9).toUpperCase();
            claims.unshift({timestamp:new Date().toLocaleString(), discord, roblox, ip, claimCode, status:'Pending'});
            localStorage.setItem('giveawayClaims', JSON.stringify(claims));
            alert("Claim submitted! Check admin for review.");
        }
    </script>
</body>
</html>
