<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NinjaRobux - Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #020205;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a0933 0%, #020205 100%);
        }
        .blur-neon-text-cyan {
            text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #00ffff;
        }
        .blur-neon-text-pink {
            text-shadow: 0 0 5px #ff007f, 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f, 0 0 60px #ff007f;
        }
        .blur-neon-btn-cyan {
            border: 2px solid #00ffff;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.05);
            text-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff;
            box-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 15px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease-in-out;
        }
        .blur-neon-btn-cyan:hover {
            background: #00ffff;
            color: #020205;
            box-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff, 0 0 100px #00ffff;
            text-shadow: none;
        }
        .blur-neon-btn-pink {
            border: 2px solid #ff007f;
            color: #ff007f;
            background: rgba(255, 0, 127, 0.05);
            text-shadow: 0 0 8px #ff007f, 0 0 15px #ff007f;
            box-shadow: 0 0 15px #ff007f, 0 0 30px rgba(255, 0, 127, 0.3), inset 0 0 15px rgba(255, 0, 127, 0.2);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease-in-out;
        }
        .blur-neon-btn-pink:hover {
            background: #ff007f;
            color: #020205;
            box-shadow: 0 0 25px #ff007f, 0 0 50px #ff007f, 0 0 100px #ff007f;
            text-shadow: none;
        }
        .blur-neon-popup {
            background: rgba(4, 2, 8, 0.85);
            border: 3px solid #ff007f;
            box-shadow: 0 0 40px #ff007f, 0 0 70px rgba(255, 0, 127, 0.5), inset 0 0 25px rgba(255, 0, 127, 0.3);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden">

    <header class="border-b border-purple-950/40 px-6 py-5 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black tracking-widest text-cyan-400 blur-neon-text-cyan">NINJAROBUX</h1>
            <nav class="flex items-center gap-4">
                <div id="userProfile" class="hidden flex items-center gap-2 bg-slate-950/80 border border-cyan-400 px-4 py-1.5 rounded-full backdrop-blur-md box-shadow: 0 0 10px #00ffff">
                    <img id="userAvatar" src="" alt="Avatar" class="w-6 h-6 rounded-full border border-cyan-400">
                    <span id="userTag" class="text-xs md:text-sm font-bold text-cyan-400 blur-neon-text-cyan"></span>
                </div>
                <a href="/login/" class="blur-neon-btn-cyan px-5 py-2 rounded-xl text-xs md:text-sm font-bold tracking-widest uppercase">Login</a>
                <a href="/giveawayclaim/" class="blur-neon-btn-pink px-5 py-2 rounded-xl text-xs md:text-sm font-bold tracking-widest uppercase">Giveaway</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto text-center px-6 py-16 flex-grow flex flex-col justify-center items-center w-full">
        <div class="space-y-8 max-w-2xl">
            <h2 class="text-4xl md:text-7xl font-black tracking-widest text-pink-500 blur-neon-text-pink leading-tight uppercase">
                WELCOME TO NINJAROBUX
            </h2>
            <p class="text-gray-300 text-sm md:text-base tracking-widest max-w-lg mx-auto leading-relaxed uppercase font-medium opacity-90">
                Experience the futuristic neon atmosphere. Join our system and explore premium exclusive features.
            </p>
            <div class="pt-6 flex justify-center items-center w-full max-w-xs mx-auto">
                <button onclick="showPopup()" class="w-full blur-neon-btn-pink px-10 py-4 rounded-xl text-sm font-black tracking-widest uppercase cursor-pointer">
                    EXPLORE NOW
                </button>
            </div>
        </div>
    </main>

    <div id="welcomePopup" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center z-50 p-4">
        <div class="blur-neon-popup p-8 rounded-2xl max-w-sm w-full text-center">
            <h3 class="text-2xl font-black text-pink-500 blur-neon-text-pink mb-4 tracking-widest uppercase">NOTIFICATION</h3>
            <p class="text-gray-200 text-sm mb-6 tracking-widest leading-relaxed uppercase font-semibold">Welcome to the futuristic network. Access granted successfully.</p>
            <button onclick="closePopup()" class="blur-neon-btn-pink px-6 py-3 rounded-xl text-sm font-black w-full tracking-widest uppercase cursor-pointer">
                CLOSE
            </button>
        </div>
    </div>

    <footer class="border-t border-purple-950/40 py-5 text-center text-[10px] tracking-widest text-gray-500 font-bold">
        <div class="max-w-6xl mx-auto px-6">
            &copy; 2026 NINJAROBUX. ALL RIGHTS RESERVED.
        </div>
    </footer>

    <script>
        function checkSession() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const discordUser = localStorage.getItem('discordUser');
            if (isLoggedIn === 'true' && discordUser) {
                const user = JSON.parse(discordUser);
                document.getElementById('userTag').innerText = user.username;
                if (user.avatar) {
                    document.getElementById('userAvatar').src = 'https://cdn.discordapp.com/avatars/' + user.id + '/' + user.avatar + '.png';
                } else {
                    document.getElementById('userAvatar').src = 'https://cdn.discordapp.com/embed/avatars/0.png';
                }
                document.getElementById('userProfile').classList.remove('hidden');
            }
        }
        function showPopup() {
            document.getElementById('welcomePopup').style.display = 'flex';
        }
        function closePopup() {
            document.getElementById('welcomePopup').style.display = 'none';
        }
        window.onload = checkSession;
    </script>
</body>
</html>
