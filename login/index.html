<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NinjaRobux - Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #030308;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #150b24 0%, #030308 100%);
        }
        .blur-neon-text-cyan {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.6), 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .blur-neon-text-pink {
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.6), 0 0 20px rgba(255, 0, 127, 0.3);
        }
        .blur-neon-btn-cyan {
            border: 2px solid #00ffff;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.02);
            text-shadow: 0 0 4px rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1), inset 0 0 10px rgba(0, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blur-neon-btn-cyan:hover {
            background: #00ffff;
            color: #030308;
            box-shadow: 0 0 25px #00ffff, 0 0 45px rgba(0, 255, 255, 0.5);
            text-shadow: none;
        }
        .blur-neon-btn-pink {
            border: 2px solid #ff007f;
            color: #ff007f;
            background: rgba(255, 0, 127, 0.02);
            text-shadow: 0 0 4px rgba(255, 0, 127, 0.5);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.1), inset 0 0 10px rgba(255, 0, 127, 0.05);
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blur-neon-btn-pink:hover {
            background: #ff007f;
            color: #030308;
            box-shadow: 0 0 25px #ff007f, 0 0 45px rgba(255, 0, 127, 0.5);
            text-shadow: none;
        }
        .blur-neon-popup {
            background: rgba(6, 4, 12, 0.75);
            border: 2px solid #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.35), inset 0 0 20px rgba(255, 0, 127, 0.15);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden">

    <header class="border-b border-purple-950/20 px-6 py-4 backdrop-blur-sm sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold tracking-widest text-cyan-400 blur-neon-text-cyan">NINJAROBUX</h1>
            <nav class="flex items-center gap-4">
                <div id="userProfile" class="hidden flex items-center gap-2 bg-slate-950/50 border border-purple-500/20 px-3 py-1 rounded-full backdrop-blur-sm">
                    <img id="userAvatar" src="" alt="Avatar" class="w-6 h-6 rounded-full border border-cyan-400">
                    <span id="userTag" class="text-xs md:text-sm font-medium text-cyan-400"></span>
                </div>
                <a href="/login/" class="blur-neon-btn-cyan px-4 py-1.5 rounded-xl text-sm font-medium tracking-wide">Login</a>
                <a href="/giveawayclaim/" class="blur-neon-btn-pink px-4 py-1.5 rounded-xl text-sm font-medium tracking-wide">Giveaway</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto text-center px-6 py-12 flex-grow flex flex-col justify-center items-center w-full">
        <div class="space-y-6 max-w-2xl">
            <h2 class="text-4xl md:text-6xl font-extrabold tracking-widest text-pink-500 blur-neon-text-pink leading-tight">
                WELCOME TO NINJAROBUX
            </h2>
            <p class="text-gray-400 text-sm md:text-base tracking-wider max-w-lg mx-auto leading-relaxed">
                Experience the futuristic neon atmosphere. Join our system and explore premium exclusive features.
            </p>
            <div class="pt-4 flex flex-col sm:flex-row justify-center items-center gap-4 w-full max-w-md mx-auto">
                <button onclick="showPopup()" class="w-full sm:w-auto blur-neon-btn-pink px-8 py-3 rounded-xl text-sm font-bold tracking-widest uppercase">
                    EXPLORE NOW
                </button>
                <a href="/login/" class="w-full sm:w-auto text-center blur-neon-btn-cyan px-8 py-3 rounded-xl text-sm font-bold tracking-widest uppercase">
                    ENTER DASHBOARD
                </a>
            </div>
        </div>
    </main>

    <div id="welcomePopup" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-50 p-4">
        <div class="blur-neon-popup p-6 md:p-8 rounded-2xl max-w-sm w-full text-center">
            <h3 class="text-xl md:text-2xl font-bold text-pink-500 blur-neon-text-pink mb-3 tracking-widest">NOTIFICATION</h3>
            <p class="text-gray-300 text-sm mb-6 tracking-wide leading-relaxed">Welcome to the futuristic network. Access granted successfully.</p>
            <button onclick="closePopup()" class="blur-neon-btn-pink px-6 py-2 rounded-xl text-sm font-medium w-full tracking-widest uppercase">
                CLOSE
            </button>
        </div>
    </div>

    <footer class="border-t border-purple-950/20 py-4 text-center text-[10px] tracking-widest text-gray-600">
        <div class="max-w-6xl mx-auto px-6">
            &copy; 2026 NINJAROBUX. ALL RIGHTS RESERVED.
        </div>
    </footer>

    <script>
        function checkSession() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const discordUser = localStorage.getItem('discordUser');
            if (isLoggedIn === 'true' && discordUser) {
                const user = JSON.parse(discordUser);
                document.getElementById('userTag').innerText = user.username;
                if (user.avatar) {
                    document.getElementById('userAvatar').src = 'https://cdn.discordapp.com/avatars/' + user.id + '/' + user.avatar + '.png';
                } else {
                    document.getElementById('userAvatar').src = 'https://cdn.discordapp.com/embed/avatars/0.png';
                }
                document.getElementById('userProfile').classList.remove('hidden');
            }
        }
        function showPopup() {
            document.getElementById('welcomePopup').style.display = 'flex';
        }
        function closePopup() {
            document.getElementById('welcomePopup').style.display = 'none';
        }
        window.onload = checkSession;
    </script>
</body>
</html>
